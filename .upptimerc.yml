# Change these first
owner: MrLyallCSIT # Your GitHub organization or username, where this repository lives
repo: adcm-network-status # The name of this repository

sites:
  - name: Network Cloud Gateway
    url: $GATEWAY_HOSTNAME
  - name: Computing:Box
    url: https://www.computingbox.co.uk/
  - name: Keresley Church
    url: https://www.keresley.church/
  - name: Keresley Church Beta Site
    url: https://beta.keresley.church/
  - name: Mottashaw Consulting
    url: https://www.mottashaw.co.uk/
  - name: Poseidon IPv4
    url: $Poseidon_HOSTNAME
    type: globalping
    check: tcp-ping
    ipv6: false
  - name: Poseidon IPv6
    url: $Poseidon_HOSTNAME
    type: globalping
    check: tcp-ping
    ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.adcmnetworks.co.uk
  # baseUrl: /your-repo-name
  logoUrl: https://service.adcmnetworks.co.uk/uploads/settings/5b762847b10c8cc2c81ded4a61c2c992ua.png
  name: ADCM Network Status
  introTitle: "**ADCM Networks** Live Status"
  introMessage: Service status across the ADCM network
  navbar:
    - title: Main Website
      href: https://www.adcmnetworks.co.uk
    - title: Service Desk
      href: https://service.adcmnetworks.co.uk
    - title: GitHub Backend
      href: https://github.com/$OWNER/$REPO
  customBodyHtml: "<img referrerpolicy='no-referrer-when-downgrade' src='https://analytics.adcmnetworks.co.uk/matomo.php?idsite=5&amp;rec=1' style='border:0' alt='Matomo Page Analytics Tracking Image' />"
# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration

i18n:
  footer: Powered by [ADCM Networks](https://www.adcmnetworks.co.uk)

assignees:
  - MrLyallCSIT

commitMessages:
  readmeContent: ":pencil: Update summary in README [skip ci] [upptime]"
  summaryJson: ":card_file_box: Update status summary [skip ci] [upptime]"
  statusChange: "$EMOJI $SITE_NAME is $STATUS ($RESPONSE_CODE in $RESPONSE_TIME ms) [skip ci] [upptime]"
  graphsUpdate: ":bento: Update graphs [skip ci] [upptime]"

skipDescriptionUpdate: false
skipTopicsUpdate: false
skipHomepageUpdate: false
skipDeleteIssues: false

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/5 * * * *"